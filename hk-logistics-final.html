        .status-dot.online { background: #27ae60; }
        .status-dot.offline { background: #e74c3c; }
        .status-dot.local { background: #9b59b6; }

            color: white;
        }

            display: flex; justify-content: space-between; align-items: center;
            background: rgba(0, 0, 0, 0.3); padding: 15px 25px; border-radius: 10px;
            margin-bottom: 20px; flex-wrap: wrap; gap: 15px;

        .status-item { display: flex; align-items: center; gap: 10px; }

        .category-traffic { background: rgba(243, 156, 18, 0.3); color: #feca57; }
        .category-policy { background: rgba(155, 89, 182, 0.3); color: #ff9ff3; }
        .category-weather { background: rgba(52, 152, 219, 0.3); color: #54a0ff; }
        .category-general { background: rgba(100, 100, 100, 0.3); color: #bdc3c7; }
        
        .risk-level { padding: 4px 10px; border-radius: 12px; font-size: 0.75em; font-weight: 700; }

        .risk-low { background: rgba(39, 174, 96, 0.4); color: #55efc4; }

        .analysis-title { font-size: 1.3em; margin-bottom: 15px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; }
        .stat-card {
            background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 10px;

        .btn {

        .btn-success { background: linear-gradient(135deg, #27ae60, #229954); color: white; }

</head>
<body>

            <div class="section news-panel">

    <script>

            logisticsNodes.hubs.forEach(node => {
                L.marker([node.lat, node.lng], { icon: icons[node.type] || icons.hub })
                    .addTo(hkMap).bindPopup(`<b>${node.name}</b><br>类型：${getTypeLabel(node.type)}`);
            });
            document.getElementById('hub-count').textContent = logisticsNodes.hubs.length;
            document.getElementById('port-count').textContent = logisticsNodes.ports.length;
            document.getElementById('airport-count').textContent = logisticsNodes.airports.length;
            document.getElementById('risk-count').textContent = logisticsNodes.hubs.filter(n => n.risk !== 'low').length;
        }
        function getTypeLabel(type) {
            return { airport: '机场', port: '港口', hub: '物流枢纽' }[type] || '未知';
        }

        // ==================== 新闻渲染 ====================
        function loadNews(filter = 'all') {
            const newsList = document.getElementById('news-list');
            
            currentNewsData = newsData;
            
            let filteredNews = currentNewsData;
            if (filter !== 'all') {
                filteredNews = currentNewsData.filter(n => n.category === filter);
            }

            newsList.innerHTML = '';
            document.getElementById('data-count').textContent = `新闻数据：${filteredNews.length} 条`;
            document.getElementById('last-update').textContent = new Date().toLocaleString('zh-CN');
            document.getElementById('info-detail').textContent = 
                `共 ${currentNewsData.length} 条新闻 | RTHK: ${currentNewsData.filter(n => n.sourceKey === 'rthk').length}条 | 政府：${currentNewsData.filter(n => n.sourceKey === 'gov').length}条`;

            if (filteredNews.length === 0) {
                newsList.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #b8b8b8;">
                        <i class="fas fa-inbox fa-2x"></i>
                        <p style="margin-top: 15px;">暂无相关新闻</p>
                    </div>
                `;
                return;
            }

            filteredNews.forEach((item, index) => {
                const newsItem = createNewsItem(item);
                newsList.appendChild(newsItem);
                setTimeout(() => { newsItem.style.opacity = '1'; newsItem.style.transform = 'translateX(0)'; }, index * 50);
            });

            generateAIReport(filteredNews);
        }

        function createNewsItem(news) {
            const item = document.createElement('div');
            item.className = `news-item ${news.breaking ? 'breaking' : ''}`;
            item.style.opacity = '0';
            item.style.transform = 'translateX(-20px)';
            item.style.transition = 'all 0.3s ease';

            const categoryColors = {
                political: '#e74c3c', traffic: '#f39c12', policy: '#9b59b6', weather: '#3498db', general: '#7f8c8d'
            };
            item.style.borderLeftColor = categoryColors[news.category];

            const breakingBadge = news.breaking ? 
                '<span style="background: #e74c3c; color: white; padding: 2px 8px; border-radius: 10px; font-size: 0.7em; font-weight: 700; margin-left: 10px;">突发</span>' : '';
            
            const sourceBadge = news.sourceKey === 'rthk' ?
                '<span class="source-badge source-rthk">RTHK</span>' :
                '<span class="source-badge source-gov">政府</span>';

            item.innerHTML = `
                <div class="news-header">
                    <div>
                        <span class="news-category category-${news.category}">${news.categoryLabel}</span>
                        <span class="risk-level risk-${news.riskLevel}">${news.riskLabel}</span>
                        ${breakingBadge}
                        ${sourceBadge}
                    </div>
                    <span class="news-time">${news.time}</span>
                </div>
                <div class="news-title">${news.title}</div>
                <div style="margin-top: 8px; color: #b8b8b8; font-size: 0.85em;">${news.content.substring(0, 200)}</div>
                <div style="margin-top: 8px; color: #7f8c8d; font-size: 0.8em;">
                    <i class="fas fa-newspaper"></i> ${news.source}
                </div>
            `;

            item.addEventListener('click', () => {
                if (news.link) window.open(news.link, '_blank');
            });

            return item;
        }

        // ==================== AI 分析 ====================
        function generateAIReport(newsData) {
            const reportDiv = document.getElementById('ai-report');
            const highRisk = newsData.filter(n => n.riskLevel === 'high').length;
            const mediumRisk = newsData.filter(n => n.riskLevel === 'medium').length;
            const lowRisk = newsData.filter(n => n.riskLevel === 'low').length;
            
            const totalRisk = highRisk * 3 + mediumRisk * 2 + lowRisk;
            const riskScore = newsData.length > 0 ? totalRisk / newsData.length : 0;
            
            let overallRisk = '低', riskColor = '#27ae60';
            if (riskScore > 2) { overallRisk = '高'; riskColor = '#e74c3c'; }
            else if (riskScore > 1.2) { overallRisk = '中'; riskColor = '#f39c12'; }

            document.getElementById('risk-alert').innerHTML = 
                `当前风险等级：<span class="risk-level risk-${overallRisk === '高' ? 'high' : overallRisk === '中' ? 'medium' : 'low'}">${overallRisk}</span>`;

            const categoryStats = {
                political: newsData.filter(n => n.category === 'political').length,
                traffic: newsData.filter(n => n.category === 'traffic').length,
                policy: newsData.filter(n => n.category === 'policy').length,
                weather: newsData.filter(n => n.category === 'weather').length
            };

            reportDiv.innerHTML = `
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px;">
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 2em; font-weight: 700; color: ${riskColor}">${overallRisk}</div>
                        <div style="color: #b8b8b8; font-size: 0.9em;">总体风险</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 2em; font-weight: 700; color: #e74c3c">${highRisk}</div>
                        <div style="color: #b8b8b8; font-size: 0.9em;">高风险事件</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 2em; font-weight: 700; color: #f39c12">${mediumRisk}</div>
                        <div style="color: #b8b8b8; font-size: 0.9em;">中风险事件</div>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; text-align: center;">
                        <div style="font-size: 2em; font-weight: 700; color: #27ae60">${lowRisk}</div>
                        <div style="color: #b8b8b8; font-size: 0.9em;">低风险事件</div>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <h3 style="margin-bottom: 10px; font-size: 1.1em;">📈 风险分布分析</h3>
                    <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px;">
                        <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;">
                            <div style="color: #ff6b6b; font-weight: 600;">🏛️ 政治风险</div>
                            <div style="font-size: 1.5em; font-weight: 700; margin-top: 5px;">${categoryStats.political}</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;">
                            <div style="color: #feca57; font-weight: 600;">🚦 交通状况</div>
                            <div style="font-size: 1.5em; font-weight: 700; margin-top: 5px;">${categoryStats.traffic}</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;">
                            <div style="color: #ff9ff3; font-weight: 600;">📋 政策更新</div>
                            <div style="font-size: 1.5em; font-weight: 700; margin-top: 5px;">${categoryStats.policy}</div>
                        </div>
                        <div style="background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px;">
                            <div style="color: #54a0ff; font-weight: 600;">🌤️ 天气预警</div>
                            <div style="font-size: 1.5em; font-weight: 700; margin-top: 5px;">${categoryStats.weather}</div>
                        </div>
                    </div>
                </div>

                <div>
                    <h3 style="margin-bottom: 10px; font-size: 1.1em;">💡 AI 智能建议</h3>
                    <ul style="line-height: 2; font-size: 0.95em;">
                        ${highRisk > 0 ? '<li><strong style="color: #e74c3c;">⚠️ 紧急：</strong> 当前存在高风险事件，请立即启动应急预案</li>' : ''}
                        ${categoryStats.political > 0 ? '<li><strong style="color: #ff6b6b;">政治因素：</strong> 密切关注政策变化，做好风险管理</li>' : ''}
                        ${categoryStats.traffic > 0 ? '<li><strong style="color: #feca57;">交通状况：</strong> 优化运输路线，避开拥堵路段</li>' : ''}
                        ${categoryStats.policy > 0 ? '<li><strong style="color: #ff9ff3;">政策变化：</strong> 及时了解最新法规，确保合规运营</li>' : ''}
                        ${categoryStats.weather > 0 ? '<li><strong style="color: #54a0ff;">天气预警：</strong> 关注气象预报，提前做好货物保护</li>' : ''}
                        ${highRisk === 0 && mediumRisk === 0 ? '<li><strong style="color: #27ae60;">✅ 良好：</strong> 当前风险可控，继续保持监测</li>' : ''}
                    </ul>
                </div>

                <div style="margin-top: 20px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); font-size: 0.85em; color: #b8b8b8;">
                    <i class="fas fa-clock"></i> 最后更新：${new Date().toLocaleString('zh-CN')} | 
                    <i class="fas fa-database"></i> 本地数据模式 | 
                    <i class="fas fa-robot"></i> AI 分析引擎 v6.0
                </div>
            `;
        }

        // ==================== 事件处理 ====================
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                loadNews(currentFilter);
            });
        });

        function refreshData() {
            const btn = document.getElementById('refresh-btn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 刷新中...';
            btn.disabled = true;
            
            setTimeout(() => {
                loadNews(currentFilter);
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 500);
        }

        function exportReport() {
            const reportData = {
                timestamp: new Date().toLocaleString('zh-CN'),
                summary: {
                    totalNews: currentNewsData.length,
                    riskLevel: document.getElementById('risk-alert').textContent
                },
                news: currentNewsData,
                analysis: 'AI 智能分析报告'
            };

            const blob = new Blob([JSON.stringify(reportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `香港物流风险报告_${new Date().toISOString().slice(0, 10)}.json`;
            a.click();
            URL.revokeObjectURL(url);
            alert('✅ 报告已导出！');
        }

        function updateTime() {
            document.getElementById('current-time').textContent = `当前时间：${new Date().toLocaleString('zh-CN')}`;
        }

        // ==================== 初始化 ====================
        window.addEventListener('DOMContentLoaded', () => {
            addNodesToMap();
            loadNews();
            updateTime();
            
            setInterval(updateTime, 60000);
        });

        window.addEventListener('resize', () => { hkMap.invalidateSize(); });
    </script>
</body>
</html>
