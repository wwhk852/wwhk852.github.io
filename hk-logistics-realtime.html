<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港物流风险洞察平台 - 实时数据版</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #ffffff;
            color: #1a1a1a;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: #ffffff;
            border-bottom: 3px solid #0066cc;
            padding: 25px 0;
            margin-bottom: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        h1 {
            color: #0066cc;
            font-size: 2.2em;
            font-weight: 600;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-top: 8px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-bottom: 30px;
        }

        .card {
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .card h2 {
            color: #0066cc;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f0f0f0;
        }

        #map {
            height: 400px;
            border-radius: 6px;
            z-index: 1;
        }

        .news-controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border: 2px solid #0066cc;
            background: #ffffff;
            color: #0066cc;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.95em;
            transition: all 0.3s;
            font-weight: 500;
        }

        .btn:hover {
            background: #0066cc;
            color: #ffffff;
        }

        .btn.active {
            background: #0066cc;
            color: #ffffff;
        }

        .btn-primary {
            background: #0066cc;
            color: #ffffff;
        }

        .btn-primary:hover {
            background: #0052a3;
        }

        #newsList {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .news-item {
            background: #f8f9fa;
            border-left: 4px solid #0066cc;
            padding: 18px;
            margin-bottom: 15px;
            border-radius: 4px;
            transition: all 0.3s;
        }

        .news-item:hover {
            background: #e3f2fd;
            transform: translateX(5px);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .news-title {
            font-weight: 600;
            font-size: 1.05em;
            color: #0066cc;
            flex: 1;
        }

        .news-time {
            color: #888;
            font-size: 0.85em;
            white-space: nowrap;
            margin-left: 15px;
        }

        .news-content {
            color: #444;
            font-size: 0.95em;
            line-height: 1.6;
            margin-bottom: 12px;
        }

        .news-tags {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tag {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.8em;
            font-weight: 500;
        }

        .tag-politics { background: #ffebee; color: #c62828; }
        .tag-traffic { background: #fff3e0; color: #ef6c00; }
        .tag-policy { background: #e3f2fd; color: #1565c0; }
        .tag-weather { background: #e8f5e9; color: #2e7d32; }
        .tag-other { background: #f5f5f5; color: #616161; }

        .risk-section {
            margin-top: 20px;
            padding: 20px;
            background: #fff8e1;
            border-left: 4px solid #ff8f00;
            border-radius: 4px;
        }

        .risk-level {
            font-size: 1.3em;
            font-weight: 600;
            color: #e65100;
            margin-bottom: 10px;
        }

        .risk-analysis {
            color: #5d4037;
            line-height: 1.7;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
            font-size: 1.1em;
        }

        .loading::after {
            content: '...';
            animation: dots 1.5s steps(4, end) infinite;
        }

        @keyframes dots {
            0%, 100% { content: '.'; }
            25% { content: '..'; }
            50% { content: '...'; }
        }

        .error {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #c62828;
        }

        .status-bar {
            background: #f5f5f5;
            padding: 12px 20px;
            border-radius: 6px;
            margin-top: 20px;
            font-size: 0.9em;
            color: #666;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-online { background: #4caf50; }
        .status-offline { background: #f44336; }

        .data-source {
            font-size: 0.85em;
            color: #888;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb {
            background: #0066cc;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0052a3;
        }

        @media (max-width: 968px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 15px;
            }

            h1 {
                font-size: 1.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1>🚢 香港物流风险洞察平台</h1>
            <p class="subtitle">实时监测政治、交通、政策与天气风险 | 数据源：RTHK & 香港特区政府</p>
        </div>
    </header>

    <div class="container">
        <div class="main-content">
            <!-- 地图卡片 -->
            <div class="card">
                <h2>📍 香港物流枢纽地图</h2>
                <div id="map"></div>
                <div class="data-source">
                    <strong>标注枢纽：</strong> 葵青货柜码头、香港国际机场、落马洲管制站、屯门货运站
                </div>
            </div>

            <!-- 新闻卡片 -->
            <div class="card">
                <h2>📰 实时新闻监测</h2>
                
                <div class="news-controls">
                    <button class="btn active" data-category="all">全部</button>
                    <button class="btn" data-category="politics">政治</button>
                    <button class="btn" data-category="traffic">交通</button>
                    <button class="btn" data-category="policy">政策</button>
                    <button class="btn" data-category="weather">天气</button>
                    <button class="btn btn-primary" onclick="fetchNews()">🔄 刷新</button>
                </div>

                <div id="newsList">
                    <div class="loading">正在加载实时新闻数据</div>
                </div>

                <div class="status-bar">
                    <div>
                        <span class="status-indicator status-online" id="statusDot"></span>
                        <span id="statusText">数据源状态：在线</span>
                    </div>
                    <div id="lastUpdate">最后更新：--</div>
                </div>
            </div>
        </div>

        <!-- AI 风险分析卡片 -->
        <div class="card">
            <h2>🤖 AI 物流风险分析</h2>
            <div id="riskAnalysis">
                <div class="loading">正在分析新闻数据</div>
            </div>
        </div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <script>
        // ==================== 配置 ====================
        const RSS2JSON_API = 'https://api.rss2json.com/api/v1';
        
        // 使用 rss2json 代理的真实 RSS 源
        const RSS_SOURCES = [
            {
                name: 'RTHK 本地新闻',
                url: 'https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml',
                fullApiUrl: `${RSS2JSON_API}?url=https://rthk.hk/rthk/news/rss/c_expressnews_clocal.xml`
            },
            {
                name: '香港政府新闻',
                url: 'https://www.info.gov.hk/gia/rss/general_zh.xml',
                fullApiUrl: `${RSS2JSON_API}?url=https://www.info.gov.hk/gia/rss/general_zh.xml`
            }
        ];

        let map = null;
        let newsData = [];
        let currentCategory = 'all';

        // ==================== 地图初始化 ====================
        function initMap() {
            // 初始化香港地图
            map = L.map('map').setView([22.3193, 114.1694], 10);

            // 使用 OpenStreetMap 图层（白色简洁风格）
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap'
            }).addTo(map);

            // 物流枢纽坐标
            const hubs = [
                { name: '🚢 葵青货柜码头', lat: 22.3089, lng: 114.1275, desc: '全球第七大货柜港' },
                { name: '✈️ 香港国际机场', lat: 22.3080, lng: 113.9185, desc: '亚太区航空枢纽' },
                { name: '🚛 落马洲管制站', lat: 22.5089, lng: 114.1336, desc: '跨境货运主要通道' },
                { name: '📦 屯门货运站', lat: 22.3950, lng: 113.9750, desc: '北部都会区物流中心' }
            ];

            // 添加枢纽标记
            hubs.forEach(hub => {
                L.marker([hub.lat, hub.lng])
                    .addTo(map)
                    .bindPopup(`
                        <div style="min-width: 150px;">
                            <strong>${hub.name}</strong><br>
                            <small>${hub.desc}</small>
                        </div>
                    `);
            });
        }

        // ==================== 新闻分类逻辑 ====================
        function classifyNews(title, content = '') {
            const text = (title + ' ' + content).toLowerCase();
            
            // 政治关键词
            if (text.match(/(示威 | 抗议 | 国安 | 选举 | 政府 | 立法会 | 行政长官 | 北京 | 中美)/)) {
                return 'politics';
            }

            // 交通关键词
            if (text.match(/(交通 | 塞车 | 地铁 | 巴士 | 码头 | 机场 | 隧道 | 大桥 | 跨境 | 货运 | 物流)/)) {
                return 'traffic';
            }

            // 政策关键词
            if (text.match(/(政策 | 法规 | 条例 | 措施 | 关税 | 贸易 | 协议 | 北部都会 | 大湾区)/)) {
                return 'policy';
            }

            // 天气关键词
            if (text.match(/(天气 | 台风 | 暴雨 | 高温 | 寒冷 | 八号 | 红色 | 黑色 | 天文台)/)) {
                return 'weather';
            }

            return 'other';
        }

        // 提取发布时间
        function parseDate(dateStr) {
            if (!dateStr) return new Date();
            const date = new Date(dateStr);
            return isNaN(date) ? new Date() : date;
        }

        // 格式化时间显示
        function formatTime(date) {
            return date.toLocaleString('zh-HK', {
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        // ==================== 获取真实新闻数据 ====================
        async function fetchNews() {
            const newsList = document.getElementById('newsList');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            
            newsList.innerHTML = '<div class="loading">正在从真实数据源加载新闻</div>';
            statusDot.className = 'status-indicator status-online';
            statusText.textContent = '数据源状态：加载中';

            let allItems = [];
            let successCount = 0;

            try {
                // 并发获取多个 RSS 源
                const promises = RSS_SOURCES.map(async (source) => {
                    try {
                        console.log('正在获取:', source.name);
                        const response = await fetch(source.fullApiUrl);
                        
                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }

                        const data = await response.json();
                        
                        if (data.status === 'ok' && data.items) {
                            console.log(`${source.name} 成功，获取 ${data.items.length} 条新闻`);
                            return data.items.map(item => ({
                                title: item.title,
                                link: item.link,
                                pubDate: item.pubDate,
                                description: item.description || '',
                                source: source.name
                            }));
                        } else {
                            throw new Error('Invalid response format');
                        }
                    } catch (error) {
                        console.error(`${source.name} 获取失败:`, error);
                        return [];
                    }
                });

                const results = await Promise.all(promises);
                
                // 合并所有新闻
                results.forEach(items => {
                    allItems = allItems.concat(items);
                });

                if (allItems.length === 0) {
                    throw new Error('所有数据源均失败');
                }

                // 按时间排序
                allItems.sort((a, b) => {
                    return new Date(b.pubDate) - new Date(a.pubDate);
                });

                // 分类并存储
                newsData = allItems.map(item => ({
                    ...item,
                    category: classifyNews(item.title, item.description),
                    displayDate: parseDate(item.pubDate)
                }));

                successCount = newsData.length;
                
                // 更新状态
                statusDot.className = 'status-indicator status-online';
                statusText.textContent = `数据源状态：在线 (${successCount} 条新闻)`;
                document.getElementById('lastUpdate').textContent = `最后更新：${formatTime(new Date())}`;

                // 渲染新闻列表
                renderNewsList();
                
                // 更新风险分析
                updateRiskAnalysis();

            } catch (error) {
                console.error('获取新闻失败:', error);
                
                // 更新状态为离线
                statusDot.className = 'status-indicator status-offline';
                statusText.textContent = '数据源状态：离线';
                
                newsList.innerHTML = `
                    <div class="error">
                        <strong>⚠️ 无法获取实时数据</strong><br>
                        可能原因：<br>
                        1. rss2json API 达到频率限制（每天 200 次）<br>
                        2. 网络连接问题<br>
                        3. RSS 源暂时不可用<br>
                        <br>
                        <strong>建议：</strong><br>
                        • 等待 5 分钟后重试<br>
                        • 检查网络连接<br>
                        • 使用本地代理方案
                    </div>
                `;
                
                document.getElementById('riskAnalysis').innerHTML = `
                    <div class="error">
                        因数据获取失败，无法进行实时风险分析
                    </div>
                `;
            }
        }

        // ==================== 渲染新闻列表 ====================
        function renderNewsList() {
            const newsList = document.getElementById('newsList');
            
            // 筛选新闻
            const filteredNews = currentCategory === 'all' 
                ? newsData 
                : newsData.filter(item => item.category === currentCategory);

            if (filteredNews.length === 0) {
                newsList.innerHTML = '<div class="loading">该分类下暂无新闻</div>';
                return;
            }

            newsList.innerHTML = filteredNews.map(item => `
                <div class="news-item" data-category="${item.category}">
                    <div class="news-header">
                        <div class="news-title">${item.title}</div>
                        <div class="news-time">${formatTime(item.displayDate)}</div>
                    </div>
                    <div class="news-content">
                        ${item.description ? cleanDescription(item.description) : '点击查看完整内容'}
                    </div>
                    <div class="news-tags">
                        <span class="tag tag-${item.category}">${getCategoryName(item.category)}</span>
                        <span class="tag tag-other">${item.source}</span>
                        <a href="${item.link}" target="_blank" style="color: #0066cc; text-decoration: none; margin-left: 10px;">🔗 原文</a>
                    </div>
                </div>
            `).join('');
        }

        // 清理描述中的 HTML 标签
        function cleanDescription(desc) {
            return desc
                .replace(/<[^>]*>/g, '')  // 移除 HTML 标签
                .replace(/&nbsp;/g, ' ')   // 替换空格
                .replace(/&amp;/g, '&')    // 替换 &
                .replace(/&lt;/g, '<')     // 替换 <
                .replace(/&gt;/g, '>')     // 替换 >
                .substring(0, 200);        // 限制长度
        }

        // 获取分类名称
        function getCategoryName(category) {
            const names = {
                politics: '政治',
                traffic: '交通',
                policy: '政策',
                weather: '天气',
                other: '其他'
            };
            return names[category] || '其他';
        }

        // ==================== AI 风险分析 ====================
        function updateRiskAnalysis() {
            const riskContainer = document.getElementById('riskAnalysis');
            
            // 统计各类别数量
            const counts = {
                politics: newsData.filter(n => n.category === 'politics').length,
                traffic: newsData.filter(n => n.category === 'traffic').length,
                policy: newsData.filter(n => n.category === 'policy').length,
                weather: newsData.filter(n => n.category === 'weather').length
            };

            // 计算风险等级
            let riskLevel = '低';
            let riskColor = '#4caf50';
            let analysis = '';

            const total = newsData.length;
            
            if (total === 0) {
                riskContainer.innerHTML = '<div class="loading">暂无数据可分析</div>';
                return;
            }

            // 风险判断逻辑
            if (counts.politics > total * 0.3 || counts.weather > total * 0.4) {
                riskLevel = '高';
                riskColor = '#f44336';
            } else if (counts.traffic > total * 0.3 || counts.policy > total * 0.2) {
                riskLevel = '中';
                riskColor = '#ff9800';
            }

            // 生成分析内容
            analysis = `
                <div class="risk-section" style="border-left-color: ${riskColor};">
                    <div class="risk-level" style="color: ${riskColor};">
                        ⚠️ 当前物流风险等级：${riskLevel}
                    </div>
                    <div class="risk-analysis">
                        <strong>数据分析：</strong><br>
                        • 政治相关：${counts.politics} 条 (${Math.round(counts.politics/total*100)}%)<br>
                        • 交通相关：${counts.traffic} 条 (${Math.round(counts.traffic/total*100)}%)<br>
                        • 政策相关：${counts.policy} 条 (${Math.round(counts.policy/total*100)}%)<br>
                        • 天气相关：${counts.weather} 条 (${Math.round(counts.weather/total*100)}%)<br>
                        <br>
                        <strong>风险提示：</strong><br>
            `;

            // 根据数据生成具体提示
            if (counts.politics > 0) {
                analysis += '• 政治事件可能影响跨境物流和通关效率<br>';
            }
            if (counts.traffic > 0) {
                analysis += '• 交通状况需关注，可能延误货物配送<br>';
            }
            if (counts.policy > 0) {
                analysis += '• 政策变化可能带来新的合规要求<br>';
            }
            if (counts.weather > 0) {
                analysis += '• 恶劣天气可能影响港口和机场运营<br>';
            }

            if (counts.politics === 0 && counts.traffic === 0 && counts.policy === 0 && counts.weather === 0) {
                analysis += '• 当前暂无显著风险因素<br>';
            }

            analysis += `
                        <br>
                        <em>基于 ${total} 条实时新闻分析 • 数据源：${RSS_SOURCES.map(s => s.name).join('、')}</em>
                    </div>
                </div>
            `;

            riskContainer.innerHTML = analysis;
        }

        // ==================== 事件监听 ====================
        document.addEventListener('DOMContentLoaded', () => {
            initMap();
            fetchNews();

            // 分类按钮事件
            document.querySelectorAll('.news-controls .btn[data-category]').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    // 更新按钮状态
                    document.querySelectorAll('.news-controls .btn').forEach(b => b.classList.remove('active'));
                    e.target.classList.add('active');

                    // 更新分类
                    currentCategory = e.target.dataset.category;
                    renderNewsList();
                });
            });
        });
    </script>
</body>
</html>
